# Cloudflare DNS blueprint for blackroad.io
# Routes public traffic through Cloudflare proxy; application traffic lands on Cloudflare Pages
# for web properties and Railway for compute-backed APIs (documented in service notes).
zone: blackroad.io
description: Primary BlackRoad OS domain. Pages serves web properties; Railway backs API/operator traffic.
core_subdomains:
  - web
  - prism
  - research
  - brand
  - archive
  - chat
records:
  - type: A
    name: "@"
    content: origin.placeholder.blackroad.io
    proxied: true
    ttl: 3600
    notes: |
      Placeholder apex origin. Replace with the ingress or load balancer address when Railway- or Kubernetes-backed origins are
      required. Cloudflare proxy remains on for TLS and edge caching even when origin is updated.
  - type: AAAA
    name: "@"
    content: "2001:db8::1"
    proxied: true
    ttl: 3600
    notes: Placeholder IPv6 apex origin. Mirrors the IPv4 note above.
  - type: CNAME
    name: www
    content: blackroad-os-web.pages.dev
    proxied: true
    ttl: 3600
    notes: Cloudflare Pages serves the public web at www; Railway fallback can re-point this CNAME to a service hostname.
  - type: CNAME
    name: web
    content: blackroad-os-web.pages.dev
    proxied: true
    ttl: 3600
    notes: Primary web property published via Pages. Keep proxy on for WAF, caching, and routing flexibility.
  - type: CNAME
    name: prism
    content: blackroad-os-prism-console.pages.dev
    proxied: true
    ttl: 3600
    notes: Prism console UI from Pages; switch to Railway hostname when authenticated experiences move to compute-backed hosting.
  - type: CNAME
    name: research
    content: blackroad-os-research.pages.dev
    proxied: true
    ttl: 3600
    notes: Research microsite on Pages.
  - type: CNAME
    name: brand
    content: blackroad-os-brand.pages.dev
    proxied: true
    ttl: 3600
    notes: Brand assets and guidelines site on Pages.
  - type: CNAME
    name: archive
    content: blackroad-os-archive.pages.dev
    proxied: true
    ttl: 3600
    notes: Archive of legacy releases on Pages.
  - type: CNAME
    name: chat
    content: nextjs-ai-chatbot.pages.dev
    proxied: true
    ttl: 3600
    notes: Chat experience hosted via Cloudflare Pages demo; move to Railway when conversational API becomes stateful.
  - type: CNAME
    name: beacon
    content: blackroad-os-beacon-production.up.railway.app
    proxied: true
    ttl: 3600
    notes: Beacon identity and heartbeat service on Railway.
  - type: CNAME
    name: agents
    content: blackroad-os-agents-production.up.railway.app
    proxied: true
    ttl: 3600
    notes: Agent orchestration service on Railway.
  - type: CNAME
    name: console
    content: blackroad-os-prism-console-production.up.railway.app
    proxied: true
    ttl: 3600
    notes: Prism console (Browser OS) on Railway.
  - type: CNAME
    name: core
    content: blackroad-os-core-production.up.railway.app
    proxied: true
    ttl: 3600
    notes: Core engine on Railway.
  - type: CNAME
    name: home
    content: blackroad-os-home-production.up.railway.app
    proxied: true
    ttl: 3600
    notes: Landing page on Railway.
  - type: CNAME
    name: api
    content: blackroad-os-api-production.up.railway.app
    proxied: true
    ttl: 3600
    notes: Core API surface on Railway.
  - type: CNAME
    name: operator
    content: blackroad-os-operator-production.up.railway.app
    proxied: true
    ttl: 3600
    notes: Operator engine on Railway.
  - type: CNAME
    name: demo
    content: blackroad-os-demo.pages.dev
    proxied: true
    ttl: 3600
    notes: Public demo on Cloudflare Pages.
  - type: CNAME
    name: ai
    content: blackroad-os-ai-proxy.workers.dev
    proxied: true
    ttl: 3600
    notes: AI vendor proxy Cloudflare Worker — routes AI API calls through BlackRoad infra.
  - type: CNAME
    name: stripe
    content: blackroad-os-stripe-webhook.workers.dev
    proxied: true
    ttl: 3600
    notes: Stripe webhook handler Cloudflare Worker.
