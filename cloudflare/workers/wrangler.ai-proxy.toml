# BlackRoad OS — AI Vendor Proxy
# Cloudflare Worker Configuration
#
# Deploy:  wrangler deploy --env production
#
# Secrets (set once, never committed):
#   wrangler secret put BLACKROAD_API_KEYS   # JSON array: ["key1","key2",...]
#   wrangler secret put OPENAI_API_KEY
#   wrangler secret put ANTHROPIC_API_KEY
#   wrangler secret put MISTRAL_API_KEY
#   wrangler secret put GROQ_API_KEY
#   wrangler secret put TOGETHER_API_KEY

name = "blackroad-os-ai-proxy"
main = "ai-vendor-proxy.js"
compatibility_date = "2024-12-01"

# account_id = "your-account-id"  # or set CLOUDFLARE_ACCOUNT_ID env var

routes = [
  { pattern = "ai.blackroad.io/*", zone_name = "blackroad.io" },
]

[env.production]
name = "blackroad-os-ai-proxy-prod"
routes = [
  { pattern = "ai.blackroad.io/*", zone_name = "blackroad.io" },
]

[env.staging]
name = "blackroad-os-ai-proxy-staging"
routes = [
  { pattern = "ai.staging.blackroad.io/*", zone_name = "blackroad.io" },
]

[vars]
ENVIRONMENT = "production"

[observability]
enabled = true
